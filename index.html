<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Sabbir's IELTS Hub</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background: #f9f9f9; }
        .section { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .paid-btn { background: #ff5722; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <!-- ফ্রি সেকশন (সবার জন্য) -->
    <div class="section">
        <h1>আইএলটিএস ফ্রি টিপস</h1>
        <p>এখানে সবার জন্য ফ্রি ভোকাবুলারি এবং রাইটিং টিপস দেওয়া আছে।</p>
        <button onclick="alert('এটি ফ্রি কন্টেন্ট!')">ফ্রি রিডিং</button>
    </div>

    <!-- পেইড সেকশন (অটোমেটেড পেমেন্ট) -->
    <div class="section">
        <h1>প্রিমিয়াম আইএলটিএস কোর্স 📚</h1>
        <p>সম্পূর্ণ প্রিমিয়াম বই ও ক্লাস পেতে পেমেন্ট করুন।</p>
        
        <!-- এখানে গামরোড বা পেমেন্ট লিংক বসাবেন -->
        <a href="https://gumroad.com/l/your-product-link" class="paid-btn">এখনই কিনুন (অটোমেটিক ডাউনলোড)</a>
    </div>

</body>
</html>
